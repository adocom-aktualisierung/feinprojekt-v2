      <div class="logo-text">Gemeinsam Kochen <span>Gemeinsam Wachsen</span></div>

    <nav class="main-nav" aria-label="Hauptnavigation" data-i18n-aria-label="common.nav.mainLabel">

        <li><a href="/partner/"{{#eq currentPage "partner"}} aria-current="page"{{/eq}} data-i18n="common.nav.kontakt">Träger &amp; Kontakt</a></li>
